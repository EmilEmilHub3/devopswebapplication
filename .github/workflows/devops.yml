# Name of the GitHub Actions workflow
name: DevOps Pipeline

# Defines when the pipeline should run
on:
  # Run automatically when code is pushed to main or master
  push:
    branches: [ "main", "master" ]

  # Allows manual execution from the GitHub Actions UI
  workflow_dispatch:

# Permissions required for this workflow
permissions:
  contents: write
  packages: write

jobs:
  delivery:
    # The runner that will execute the pipeline
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Convert repository name to lowercase
      - name: Set lowercase repository name
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # Step 3: Calculate semantic version based on commit messages
      - name: Calculate semantic version
        id: semver-app
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: ""
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          version_format: "${major}.${minor}.${patch}"

      # Step 4: Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Build the Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ steps.repo.outputs.repo }}:staging \
            -t ghcr.io/${{ steps.repo.outputs.repo }}:latest \
            -t ghcr.io/${{ steps.repo.outputs.repo }}:${{ steps.semver-app.outputs.version }} \
            -f DevOpsWebApplication/Dockerfile \
            .

      # Step 6: Push the Docker images to GHCR
      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ steps.repo.outputs.repo }}:staging
          docker push ghcr.io/${{ steps.repo.outputs.repo }}:latest
          docker push ghcr.io/${{ steps.repo.outputs.repo }}:${{ steps.semver-app.outputs.version }}

      # Step 7: Create a GitHub Release
      - name: Create release notes
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.semver-app.outputs.version }}
          generateReleaseNotes: true
          allowUpdates: true
          body: |
            This release includes the following container image:
            http://ghcr.io/${{ steps.repo.outputs.repo }}:${{ steps.semver-app.outputs.version }}

      # Deploy to STAGING
      - name: Deliver Docker compose file to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.yaml"
          target: dowa/

      - name: Run Docker Compose on staging server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd dowa
            docker compose pull
            docker compose up -d


  deployment:
    name: Deploy to production
    runs-on: ubuntu-latest

    # Wait for staging deployment to finish
    needs: delivery

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deliver production compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          source: "docker-compose.production.yaml"
          target: dowa/

      - name: Run Docker Compose on production server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd dowa
            docker compose -f docker-compose.production.yaml pull
            docker compose -f docker-compose.production.yaml up -d